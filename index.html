<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026 여름방학 교실백점 특강 캘린더</title>
<style>
  :root{
    --bg:#ffffff; --bg2:#f7f6f2; --border:#e3e1d8; --text:#222; --muted:#777;
  }
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background:var(--bg2); color:var(--text); margin:0; padding:24px;
  }
  h1{ font-size:20px; font-weight:600; margin:0 0 4px; }
  .sub{ font-size:13px; color:var(--muted); margin-bottom:16px; }
  .toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px;}
  button{
    font-size:13px; padding:8px 14px; border:1px solid var(--border); background:var(--bg);
    border-radius:8px; cursor:pointer; color:var(--text);
  }
  button:hover{ background:var(--bg2); }
  #status{ font-size:13px; color:var(--muted); }
  
  /* 주차별 컨테이너 스타일 */
  .week-block {
    background: var(--bg); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.02);
  }
  .week-title {
    font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #444; padding-left: 4px; border-left: 4px solid var(--muted);
  }
  .grid-wrap{ overflow-x:auto; }
  .grid{
    display:grid; grid-template-columns: repeat(7, minmax(150px,1fr)); gap:8px; min-width:1100px;
  }
  .dow{ font-size:13px; color:var(--muted); text-align:center; padding:6px 0; font-weight:600; border-bottom: 2px solid var(--border); margin-bottom: 4px;}
  .cell{
    border:1px solid var(--border); border-radius:8px; padding:8px; min-height:160px; background:#fff; display: flex; flex-direction: column; gap: 6px;
  }
  .cell.empty{ border:none; background:transparent; }
  .date{ font-size:13px; font-weight:700; margin-bottom:4px; color: #333; }
  
  /* 시간별 슬롯 스타일 */
  .time-slot {
    border: 1px dashed #e3e1d8; border-radius: 6px; padding: 6px; min-height: 50px; display: flex; flex-direction: column; justify-content: flex-start; background: #fafafa; gap: 4px;
  }
  .time-label {
    font-size: 11px; font-weight: 700; color: #888; margin-bottom: 2px; display: inline-block;
  }

  /* 세션 카드 스타일 */
  .sess{
    border-radius: 6px; padding: 6px 8px; font-size:12px; line-height:1.4; cursor:pointer; width: 100%; box-sizing: border-box;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .sess:hover {
    transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.08);
  }
  .sess .topic-tag {
    font-size: 10px; font-weight: 700; display: inline-block; margin-bottom: 3px; opacity: 0.8;
  }
  .sess .title{
    font-weight: 700; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  }

  /* 카테고리 컬러 테마 */
  .cat-자기계발{ background:#EEEDFE; color:#26215C; border-left: 3px solid #7F77DD; }
  .cat-업무효율화{ background:#E6F1FB; color:#042C53; border-left: 3px solid #378ADD; }
  .cat-수업관련{ background:#E1F5EE; color:#04342C; border-left: 3px solid #1D9E75; }
  .cat-생활지도{ background:#FAECE7; color:#4A1B0C; border-left: 3px solid #D85A30; }
  .cat-학급경영{ background:#FAEEDA; color:#412402; border-left: 3px solid #BA7517; }
  .cat-기타{ background:#F1EFE8; color:#2C2C2A; border-left: 3px solid #888780; }

  .legend{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; font-size:12px; color:var(--muted); }
  .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:4px; vertical-align:-1px; }
  .dot-자기계발{ background:#7F77DD; }
  .dot-업무효율화{ background:#378ADD; }
  .dot-수업관련{ background:#1D9E75; }
  .dot-생활지도{ background:#D85A30; }
  .dot-학급경영{ background:#BA7517; }
  .dot-기타{ background:#888780; }

  /* 팝업 모달 스타일 */
  .modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
  }
  .modal-content {
    background-color: #fefefe; margin: 10% auto; padding: 24px; border: 1px solid #888; width: 80%; max-width: 550px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: relative;
  }
  .close {
    color: #aaa; position: absolute; right: 20px; top: 16px; font-size: 28px; font-weight: bold; cursor: pointer;
  }
  .close:hover { color: #222; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #111; line-height: 1.5; padding-right: 24px; }
  .info-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
  .info-table th, .info-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
  .info-table th { background: var(--bg2); color: #555; width: 30%; font-weight: 600; }
  .info-table td { color: #222; line-height: 1.5; white-space: pre-wrap; }

  .error-box{ font-size:13px; color:var(--muted); padding:16px; border:1px solid var(--border); border-radius:8px; background:#fff; }
</style>
</head>
<body>

<h1>2026 여름방학 교실백점 특강 캘린더</h1>
<div class="sub">구글 시트와 연동되어 있습니다. 주차별 일정을 고정 시간대별로 정렬하여 보여주며, 카드를 클릭하면 상세 안내가 나타납니다.</div>

<div class="legend">
  <span><span class="dot dot-자기계발"></span>자기계발</span>
  <span><span class="dot dot-업무효율화"></span>업무효율화</span>
  <span><span class="dot dot-수업관련"></span>수업 관련</span>
  <span><span class="dot dot-생활지도"></span>생활지도 &amp; 교권</span>
  <span><span class="dot dot-학급경영"></span>학급경영</span>
  <span><span class="dot dot-기타"></span>기타</span>
</div>

<div class="toolbar">
  <div id="status">불러오는 중...</div>
  <button id="refresh-btn">🔄 새로고침</button>
</div>

<div id="cal-container">불러오는 중...</div>

<div id="detailModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <div class="modal-title" id="m-title">강의 제목</div>
    <table class="info-table">
      <tr><th>연수 주제</th><td id="m-topic"></td></tr>
      <tr><th>일시 (시간)</th><td id="m-time"></td></tr>
      <tr><th>강사명</th><td id="m-teacher"></td></tr>
      <tr><th>연수 대상</th><td id="m-target"></td></tr>
      <tr><th>녹화본 제공</th><td id="m-record"></td></tr>
      <tr><th>사전 안내 사항</th><td id="m-notice"></td></tr>
      <tr><th>강의자료 제공</th><td id="m-material"></td></tr>
    </table>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SHEET_ID = "1aV6EsFMlemWoD76kfx4Y28P46VgzHOulP0jLs5hC7D4";
const GID = "0";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv&gid=" + GID;
const WEEK = ["월","화","수","목","금","토","일"];
const FIXED_TIMES = ["10:00", "13:00", "16:00", "19:30"];

const CATMAP = {
  "자기계발":"자기계발",
  "업무효율화":"업무효율화",
  "수업 관련":"수업관련",
  "생활지도 & 교권":"생활지도",
  "학급경영":"학급경영"
};

let allSessionsMap = {};

const container = document.getElementById('cal-container');
const statusEl = document.getElementById('status');
const btn = document.getElementById('refresh-btn');
const modal = document.getElementById("detailModal");
const closeModal = document.querySelector(".close");

function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function normalizeTime(timeStr) {
  const clean = timeStr.replace(/[^0-9:]/g, "");
  if(clean.startsWith("10:")) return "10:00";
  if(clean.startsWith("13:")) return "13:00";
  if(clean.startsWith("16:")) return "16:00";
  if(clean.startsWith("19:3")) return "19:30";
  return timeStr;
}

function parseRows(rows){
  const recs = [];
  for(let i=2; i<rows.length; i++){
    const r = rows[i];
    if(!r || r.length < 11) continue;
    
    // 헤더 구조 순서에 맞춰 정확한 열 매칭 (0부터 시작)
    const month = (r[1]||"").trim();    // B열
    const day = (r[2]||"").trim();      // C열
    const weekday = (r[3]||"").trim();  // D열
    const time = (r[4]||"").trim();     // E열
    const teacher = (r[5]||"").trim();  // F열 (강사명)
    const target = (r[6]||"").trim();   // G열 (연수 대상)
    const topic = (r[7]||"").trim();    // H열 (연수 주제)
    const record = (r[8]||"").trim();   // I열 (녹화본 제공여부)
    const title = (r[9]||"").trim();    // J열 (강의 제목) -> 실제 시트의 J열 매칭 확인
    const notice = (r[10]||"").trim();  // K열 (강의 사전 안내 사항)
    const material = (r[11]||"").trim(); // L열 (강의자료 제공 여부)

    if(WEEK.indexOf(weekday)===-1) continue;
    if(!title && !teacher) continue;
    
    recs.push({month, day, weekday, time, teacher, target, topic, record, title, notice, material});
  }
  
  // 날짜 및 시간 오름차순 정렬
  recs.sort((a, b) => {
    if(parseInt(a.month) !== parseInt(b.month)) return parseInt(a.month) - parseInt(b.month);
    if(parseInt(a.day) !== parseInt(b.day)) return parseInt(a.day) - parseInt(b.day);
    return FIXED_TIMES.indexOf(normalizeTime(a.time)) - FIXED_TIMES.indexOf(normalizeTime(b.time));
  });

  return recs;
}

// 주차 분리 로직 개선 (날짜가 연속되거나 끊길 때 빈 칸 유지하면서 달력 형태로 정돈)
function buildRows(recs){
  const weeks = [];
  if(recs.length === 0) return weeks;

  let currentWeek = new Array(7).fill(null);
  
  // 첫 데이터의 날짜 기준으로 첫 주차 시작 설정
  recs.forEach(rec => {
    const wIdx = WEEK.indexOf(rec.weekday);
    
    // 만약 한 주차 내의 해당 요일에 이미 다른 날짜 데이터가 들어가 있다면 주차를 넘김
    if (currentWeek[wIdx] && (currentWeek[wIdx].day !== rec.day || currentWeek[wIdx].month !== rec.month)) {
      weeks.push(currentWeek);
      currentWeek = new Array(7).fill(null);
    }
    
    // 월요일을 만나고 이미 주차에 데이터가 어느 정도 차 있다면 새로운 주차로 판단
    if (wIdx === 0 && currentWeek.some(c => c !== null) && currentWeek[0] && currentWeek[0].day !== rec.day) {
      weeks.push(currentWeek);
      currentWeek = new Array(7).fill(null);
    }

    if(!currentWeek[wIdx]) {
      currentWeek[wIdx] = {month:rec.month, day:rec.day, weekday:rec.weekday, sessions:[]};
    }
    currentWeek[wIdx].sessions.push(rec);
  });

  if (currentWeek.some(c => c !== null)) {
    weeks.push(currentWeek);
  }
  return weeks;
}

function render(weeks){
  let html = '';
  allSessionsMap = {};
  
  weeks.forEach((week, index) => {
    const validCells = week.filter(c => c !== null);
    const startText = validCells.length > 0 ? `${validCells[0].month}/${validCells[0].day}` : '';
    const endText = validCells.length > 0 ? `${validCells[validCells.length-1].month}/${validCells[validCells.length-1].day}` : '';
    
    html += `<div class="week-block">`;
    html += `  <div class="week-title">${index + 1}주차 일시 (${startText} ~ ${endText})</div>`;
    html += `  <div class="grid-wrap">`;
    html += `    <div class="grid">`;
    
    WEEK.forEach(w=>{
      html += `<div class="dow">${w}</div>`;
    });
    
    week.forEach(cell=>{
      if(!cell){
        html += '<div class="cell empty"></div>';
        return;
      }
      
      let cellInner = `<div class="date">${escapeHtml(cell.month)}/${escapeHtml(cell.day)}</div>`;
      const slotMap = { "10:00":[], "13:00":[], "16:00":[], "19:30":[], "기타":[] };
      
      cell.sessions.forEach(s => {
        const norm = normalizeTime(s.time);
        if(slotMap[norm]) slotMap[norm].push(s);
        else slotMap["기타"].push(s);
      });
      
      FIXED_TIMES.forEach(fixedTime => {
        cellInner += `<div class="time-slot">`;
        cellInner += `  <span class="time-label">${fixedTime}</span>`;
        
        const targetSessions = slotMap[fixedTime];
        if(targetSessions && targetSessions.length > 0) {
          targetSessions.forEach(s => {
            const cat = CATMAP[s.topic] || "기타";
            const sId = `sess_${s.month}_${s.day}_${s.time.replace(/[^a-zA-Z0-9]/g,'')}`;
            allSessionsMap[sId] = s;
            
            // 시트 열 매칭 수정완료: 연수주제(H열)와 강의제목(J열)만 출력
            cellInner += `<div class="sess cat-${cat}" onclick="openSessionDetail('${sId}')">`
              + `  <div class="topic-tag">#${escapeHtml(s.topic)}</div>`
              + `  <div class="title">${escapeHtml(s.title)}</div>`
              + `</div>`;
          });
        }
        cellInner += `</div>`;
      });
      
      if(slotMap["기타"].length > 0) {
        slotMap["기타"].forEach(s => {
          const cat = CATMAP[s.topic] || "기타";
          const sId = `sess_${s.month}_${s.day}_${s.time.replace(/[^a-zA-Z0-9]/g,'')}`;
          allSessionsMap[sId] = s;
          
          cellInner += `<div class="time-slot" style="border-color: #ffcccc; background: #fffcfc;">`;
          cellInner += `  <span class="time-label" style="color: #d85a30;">${escapeHtml(s.time)}</span>`;
          cellInner += `  <div class="sess cat-${cat}" onclick="openSessionDetail('${sId}')">`
            + `    <div class="topic-tag">#${escapeHtml(s.topic)}</div>`
            + `    <div class="title">${escapeHtml(s.title)}</div>`
            + `  </div>`;
          cellInner += `</div>`;
        });
      }
      
      html += `<div class="cell">${cellInner}</div>`;
    });
    
    html += `    </div>`;
    html += `  </div>`;
    html += `</div>`;
  });
  
  container.innerHTML = html;
}

window.openSessionDetail = function(sId) {
  const s = allSessionsMap[sId];
  if(!s) return;
  
  document.getElementById("m-title").textContent = s.title || "지정된 강의 제목이 없습니다.";
  document.getElementById("m-topic").textContent = s.topic || "-";
  document.getElementById("m-time").textContent = `${s.month}월 ${s.day}일 (${s.weekday}) / ${s.time}`;
  document.getElementById("m-teacher").textContent = s.teacher || "-";
  document.getElementById("m-target").textContent = s.target || "-";
  document.getElementById("m-record").textContent = s.record || "-";
  document.getElementById("m-notice").textContent = s.notice || "특이사항 없음";
  document.getElementById("m-material").textContent = s.material || "-";
  
  modal.style.display = "block";
}

closeModal.onclick = function() { modal.style.display = "none"; }
window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

async function load(){
  statusEl.textContent = '불러오는 중...';
  try{
    const res = await fetch(SHEET_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const text = await res.text();
    const parsed = Papa.parse(text);
    const recs = parseRows(parsed.data);
    if(recs.length===0) throw new Error("데이터를 찾을 수 없습니다");
    
    const weeks = buildRows(recs);
    render(weeks);
    
    const now = new Date();
    statusEl.textContent = '마지막 갱신: '+now.toLocaleString('ko-KR');
  }catch(err){
    statusEl.textContent = '불러오기 실패';
    container.innerHTML = '<div class="error-box">시트를 불러오지 못했습니다.<br>'
      + '오류 내용: '+escapeHtml(err.message)+'</div>';
  }
}

btn.addEventListener('click', load);
load();
</script>

</body>
</html>
